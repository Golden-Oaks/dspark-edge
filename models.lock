# Distributed DSpark Decoder — Pinned model artifacts
# Resolves requirements.md BASE-001 and plan.md P0-T02.
# Generated from docs/dspark/baseline.md investigation.

[source]
# Exact llama.cpp fork that contains the DSpark Gemma4 converter and graph.
fork_url = "https://github.com/Ankk98/llama.cpp.git"
fork_branch = "ft-dspark"
fork_commit = "1612172a8e349ec378da7ba26ca37070aac0f690"
upstream_url = "https://github.com/ggml-org/llama.cpp.git"
upstream_merge_base = "f708a5b2caaee0226c0af220e366785699ba41e2"

[target]
# Full Gemma 4 12B instruction-tuned target model.
# Used by the authoritative target server for feature extraction and verification.
# This is the bf16 artifact used for the in-process parity gate
# (quantized targets are intentionally not the hard parity reference).
url = "https://huggingface.co/ggml-org/gemma-4-12B-it-GGUF/resolve/main/gemma-4-12B-it-bf16.gguf"
sha256 = "9338475993d2b4b86395720d49eb2a244b25eac0fa1f95f2caef381ea9503301"
size = 23832064928

[draft]
# DSpark draft model for Gemma 4 12B (self-contained GGUF).
# Contains token_embd, output/lm_head, and DSpark encoder/decoder/Markov tensors.
# Source HF checkpoint: deepseek-ai/dspark_gemma4_12b_block7
url = "https://huggingface.co/ankk98/dspark-gemma4-12b-block7-Q4_0-GGUF/resolve/main/dspark_gemma4_12b_q4pure.gguf"
sha256 = "e199bcbff6e1b76083912664ffc66106b3fe8ce222dc7ae36c3bdb42d751c507"
size = 1945726528

[shared]
# The draft GGUF is self-contained; no separate shared tokenizer/vocab/model
# artifact is required.  See docs/dspark/baseline.md "Tensor sharing".
url = ""
sha256 = ""
size = 0

[conversion]
# Script that converts the HF DSpark checkpoint into a draft GGUF.
script_path = "convert_hf_to_gguf.py"
script_commit = "1612172a8e349ec378da7ba26ca37070aac0f690"
script_url = "https://github.com/Ankk98/llama.cpp/blob/1612172a8e349ec378da7ba26ca37070aac0f690/convert_hf_to_gguf.py"

[build]
# Reference build configuration for the in-process parity gate.
# See docs/dspark/baseline.md "Build configuration" for full context.
cmake_minimum = "3.14"
cmake_generator = "Ninja"
build_type = "Release"
backend = "GGML_CUDA=ON"
cpu_gpu_flags = "CMAKE_CUDA_ARCHITECTURES=86"
extra_cmake_flags = "-DLLAMA_CURL=OFF"
targets = "compare_vanilla_speculative smoke_batched_logits_repro"
thread_count = -1

[target_runtime]
# Baseline runtime flags recorded for BASE-001.
context_size = 512
batch_size = 2048
ubatch_size = 512
ngl = 99
ngld = 99
temperature = 0.0
seed = 42

[draft_runtime]
# Baseline DSpark speculative flags recorded for BASE-001.
spec_type = "draft-dspark"
spec_draft_n_max = 4
draft_block_size = 7
dspark_confidence_threshold = 0.0
env = "DSPARK_NO_ADAPTIVE_NMAX=1"
